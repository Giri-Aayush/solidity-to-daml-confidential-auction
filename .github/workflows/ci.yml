name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  solidity:
    name: solidity (foundry)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1
        with:
          version: stable

      - name: Run Foundry tests
        working-directory: solidity
        run: forge test -vv

  daml:
    name: daml (dpm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Java 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install DPM and the Daml SDK
        run: |
          # Supply-chain: third-party actions above are pinned to commit SHAs (not
          # mutable tags), and the SDK version is pinned below (dpm install 3.4.11).
          # Fetch the installer to a file and run it from disk rather than piping
          # straight to sh, so a failed/partial download (curl -f exits non-zero)
          # short-circuits and is never executed. Pin to a published checksum here
          # once Digital Asset provides one.
          curl -fsSL -o "$RUNNER_TEMP/dpm-install.sh" https://get.digitalasset.com/install/install.sh
          sh "$RUNNER_TEMP/dpm-install.sh"
          echo "$HOME/.dpm/bin" >> "$GITHUB_PATH"

      - name: Install Daml 3.4.11
        run: dpm install 3.4.11

      - name: Run Daml Script tests
        working-directory: daml
        run: dpm test
